components:
  schemas:
    CreateTaskInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateTaskInputBody.json
          format: uri
          readOnly: true
          type: string
        notes:
          description: Optional longer detail
          maxLength: 2000
          type: string
        title:
          description: Short task title
          maxLength: 200
          minLength: 1
          type: string
      required:
        - title
      type: object
    EditTaskInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/EditTaskInputBody.json
          format: uri
          readOnly: true
          type: string
        notes:
          description: New notes (omit to leave unchanged; empty string clears notes)
          maxLength: 2000
          type: string
        title:
          description: New title (omit to leave unchanged)
          maxLength: 200
          minLength: 1
          type: string
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ListTasksOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListTasksOutputBody.json
          format: uri
          readOnly: true
          type: string
        active:
          description: "Active pool: Pending and In Progress tasks, manually ordered"
          items:
            $ref: "#/components/schemas/TaskDTO"
          type:
            - array
            - "null"
        max_in_progress:
          description: Server-enforced limit on concurrent In Progress tasks
          format: int64
          type: integer
        older_completed:
          description: Tasks completed more than 24h ago, newest-first
          items:
            $ref: "#/components/schemas/TaskDTO"
          type:
            - array
            - "null"
        recently_completed:
          description: Tasks completed within the last 24h (rolling), newest-first
          items:
            $ref: "#/components/schemas/TaskDTO"
          type:
            - array
            - "null"
      required:
        - active
        - recently_completed
        - older_completed
        - max_in_progress
      type: object
    MoveTaskInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/MoveTaskInputBody.json
          format: uri
          readOnly: true
          type: string
        position:
          description: Desired 0-based index within the active ordering
          format: int64
          minimum: 0
          type: integer
      required:
        - position
      type: object
    TaskDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TaskDTO.json
          format: uri
          readOnly: true
          type: string
        completed_at:
          description: When the task was completed, if it has been
          format: date-time
          type: string
        created_at:
          description: When the task was created
          format: date-time
          type: string
        deleted_at:
          description: When the task was cancelled, if it has been
          format: date-time
          type: string
        id:
          description: Unique task identifier
          format: int64
          type: integer
        notes:
          description: Optional longer detail
          type: string
        position:
          description: Manual ordering position within the active pool
          format: int64
          type: integer
        status:
          description: Lifecycle status
          enum:
            - pending
            - in_progress
            - completed
          type: string
        title:
          description: Short task title
          type: string
      required:
        - id
        - title
        - notes
        - status
        - position
        - created_at
      type: object
info:
  title: Tasky API
  version: 1.0.0
openapi: 3.1.0
paths:
  /tasks:
    get:
      description: "Return the active pool: Pending and In Progress tasks, manually ordered."
      operationId: listTasks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTasksOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List active tasks
      tags:
        - tasks
    post:
      description: Create a task from a title and optional notes. A created task starts as Pending.
      operationId: createTask
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a task
      tags:
        - tasks
  /tasks/{id}:
    delete:
      description: Cancel a task as an orthogonal soft delete (stamping deleted_at), allowed from any status. A cancelled task is filtered from every view. Cancelling a task that is missing or already cancelled is rejected with 404 Not Found.
      operationId: cancelTask
      parameters:
        - description: Identifier of the task to cancel (soft delete)
          in: path
          name: id
          required: true
          schema:
            description: Identifier of the task to cancel (soft delete)
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cancel a task
      tags:
        - tasks
    patch:
      description: Update a task's title and/or notes (partial update), allowed in any status — Pending, In Progress, or Completed. Lifecycle fields (status, completion, cancellation) are not part of this contract. Editing a missing or cancelled task is rejected with 404 Not Found.
      operationId: editTask
      parameters:
        - description: Identifier of the task to edit
          in: path
          name: id
          required: true
          schema:
            description: Identifier of the task to edit
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditTaskInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Edit a task
      tags:
        - tasks
  /tasks/{id}/complete:
    post:
      description: Transition an In Progress task to Completed, stamping the completion time. Completed is terminal. Completing a task that is not In Progress is rejected with 409 Conflict.
      operationId: completeTask
      parameters:
        - description: Identifier of the In-Progress task to complete
          in: path
          name: id
          required: true
          schema:
            description: Identifier of the In-Progress task to complete
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Complete a task
      tags:
        - tasks
  /tasks/{id}/move:
    post:
      description: Move a live active task (Pending or In Progress) to a 0-based index within the active ordering, renumbering the whole active set to contiguous positions in one transaction. The position is clamped to the bounds of the active list, so an out-of-range index lands the task last. Moving a task that is missing, completed, or cancelled is rejected with 404 Not Found.
      operationId: moveTask
      parameters:
        - description: Identifier of the active task to move
          in: path
          name: id
          required: true
          schema:
            description: Identifier of the active task to move
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveTaskInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Move a task
      tags:
        - tasks
  /tasks/{id}/pick:
    post:
      description: "Transition a Pending task to In Progress. The server validates the pick in one transaction: the task must still be Pending and the In-Progress limit must not be reached. A pick that matches no eligible row is rejected with 409 Conflict."
      operationId: pickTask
      parameters:
        - description: Identifier of the Pending task to pick
          in: path
          name: id
          required: true
          schema:
            description: Identifier of the Pending task to pick
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Pick a task
      tags:
        - tasks
